name: Initialize Community Issues
on:
  push:
    paths:
      - '.github/workflows/initialize-issues.yml'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Good First Issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create --title "[FEATURE] Expand SQL Injection Payloads for Hacker Agent" --label "good first issue" --label "help wanted" --body "The current HackerAgent implementation in core/agents/hacker-agent.js uses an examples-based prompt for the LLM. We need to create a new utility file core/utils/payloads.js that contains a dictionary of curated SQLi, XSS, and Prototype Pollution payloads. These should then be dynamically injected into the getAttackPrompt method to guide the LLM's adversarial testing. Reference: https://github.com/ansonsaju/project-claudia/blob/main/CONTRIBUTING.md"
          
          gh issue create --title "[UI] Dashboard Mobile Responsiveness" --label "good first issue" --label "help wanted" --body "The current dashboard in ui/index.html (and associated ui/css/style.css) lacks a fluid grid system. We need to implement CSS Media Queries (@media) to handle viewport widths below 768px, specifically targeting the sidebar and main-content layout to prevent overlapping. Reference: https://github.com/ansonsaju/project-claudia/blob/main/CONTRIBUTING.md"
          
          gh issue create --title "[BUG] Implement and Document Timeout Logic in Sandbox Runner" --label "good first issue" --label "help wanted" --label "documentation" --body "In core/sandbox-runner.js, the spawnSync calls for both Node.js and Python currently do not have a timeout property in their options object. This means untrusted code could run indefinitely. Implement a timeout: 10000 (10 seconds) constraint and add JSDoc comments explaining the security rationale. Reference: https://github.com/ansonsaju/project-claudia/blob/main/CONTRIBUTING.md"
          
          gh issue create --title "[REFACTOR] Standardize Error Handling in LLM Provider" --label "good first issue" --label "help wanted" --body "The getAgentProvider function in core/llm-provider.js returns an async function that performs multiple mock calls. We need to wrap these calls in a structured try-catch block that catches network/timeout errors, logs them using the existing audit-logger.js, and returns a standardized error artifact instead of a raw exception. Reference: https://github.com/ansonsaju/project-claudia/blob/main/CONTRIBUTING.md"
