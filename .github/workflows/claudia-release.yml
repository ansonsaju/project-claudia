name: 🚀 Hardened Release (OIDC)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # To create releases
  id-token: write # To publish to npm with OIDC

jobs:
  release:
    name: Immutable Release & NPM Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm ci

      - name: Run Security Audit
        run: npm audit --audit-level=high

      - name: Build Assets
        run: |
          # Create a compressed archive of the core engine
          tar -czvf claudia-vanguard-${{ github.ref_name }}.tar.gz core/ scripts/ ui/ package.json
          # Generate SHA-256 Checksums for provenance
          sha256sum claudia-vanguard-${{ github.ref_name }}.tar.gz > checksums.txt

      - name: Create GitHub Release (Immutable)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            claudia-vanguard-${{ github.ref_name }}.tar.gz
            checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Publish to NPM (OIDC)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} # Note: For strict OIDC, npm supports tokenless but secrets.NPM_TOKEN is common fallback
