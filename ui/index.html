<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claudia | Adversarial Verification</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="minimal.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo">
                CLAUDIA <span>1.0</span>
            </div>

            <div class="control-group">
                <label>Vanguard Status</label>
                <div style="font-size: 0.8rem; font-weight: 600; color: var(--success);">UNIVERSAL PROTECTION ACTIVE</div>
            </div>

            <div class="control-group">
                <label>System Requirements</label>
                <textarea id="promptInput" placeholder="Describe the function logic..."></textarea>
            </div>

            <button class="btn-verify" id="verifyBtn">Verify Implementation</button>

            <div id="systemLogs" style="font-size: 0.7rem; color: var(--text-dim); margin-top: 1rem; overflow-y: auto;">
                <p>System Ready.</p>
            </div>
        </aside>

        <main class="arena">
            <header class="status-header">
                <div class="status-stat">
                    <span class="stat-label">Project Health</span>
                    <span class="stat-value" id="healthScore" style="color:var(--success)">98%</span>
                </div>
                <div class="status-stat">
                    <span class="stat-label">Verification Engine</span>
                    <span class="stat-value" id="engineStatus">IDLE</span>
                </div>
                <div class="status-stat">
                    <span class="stat-label">Vanguard Mode</span>
                    <span class="stat-value success-msg">HYBRID</span>
                </div>
                <div class="status-stat">
                    <span class="stat-label">Integrity</span>
                    <span class="stat-value" id="integrityStatus">VERIFIED</span>
                </div>
                <div class="status-stat">
                    <span class="stat-label">Cycles</span>
                    <span class="stat-value" id="cycleCount">0 / 3</span>
                </div>
            </header>

            <div style="margin-top: 1rem; margin-bottom: 2rem;">
                <button class="btn-verify" id="scanProjectBtn" style="background:#f0f0f0; color:#000; border:1px solid #ddd;">Scan Full Project (Vanguard Audit)</button>
            </div>

            <div class="panel-grid">
                <section class="panel" id="generatorPanel">
                    <div class="panel-head">
                        <span>THE BUILDER</span>
                        <span id="generatorBadge">—</span>
                    </div>
                    <div class="code-view"><pre id="generatorCode">// Standby</pre></div>
                </section>

                <section class="panel" id="hackerPanel">
                    <div class="panel-head">
                        <span>THE ADVERSARY</span>
                        <span id="hackerBadge">—</span>
                    </div>
                    <div class="code-view"><pre id="hackerCode">// Standing by for attack</pre></div>
                </section>
            </div>

            <footer class="signature-footer">
                <div>&copy; 2026 Project Claudia</div>
                <div>Directed by <a href="https://github.com/ansonsaju" target="_blank">Anson</a></div>
            </footer>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
