version: '3.8'

services:
  claudia-engine:
    build: .
    container_name: claudia-vanguard-engine
    ports:
      - "8001:8001"
    env_file: .env
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    restart: always

  claudia-sandbox:
    image: node:24-alpine
    container_name: claudia-vanguard-sandbox
    command: tail -f /dev/null
    volumes:
      - ./claudia_runtime:/runtime
    security_opt:
      - no-new-privileges:true
    restart: on-failure

networks:
  default:
    name: claudia-network
